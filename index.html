<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#14181D">
<title>Birdie's Shooting Tracker</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    background: #14181D;
    min-height: 100vh;
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
  }
  @import url('https://fonts.googleapis.com/css2?family=Teko:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap');

  .st-app * { box-sizing: border-box; }
  .st-app {
    --bg: #14181D;
    --surface: #1D232B;
    --surface2: #262E38;
    --line: #333D49;
    --text: #EDEFF2;
    --muted: #8B93A1;
    --accent: #D99C46;
    --make: #46B37E;
    --miss: #C9636B;
    font-family: 'Inter', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    max-width: 460px;
    margin: 0 auto;
    padding: 14px 14px 40px;
    border-radius: 18px;
    position: relative;
  }
  .st-app h1, .st-app h2, .st-app h3 { font-family: 'Teko', sans-serif; letter-spacing: 0.02em; margin: 0; }
  .st-app button { font-family: 'Inter', sans-serif; cursor: pointer; }
  .st-app :focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

  .st-header { text-align: center; margin-bottom: 10px; position: relative; }
  .st-header .eyebrow { color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: 0.14em; margin-bottom: 2px; }
  .st-header h1 { font-size: 26px; font-weight: 700; color: var(--text); }
  .st-back-link {
    background: none; border: none; color: var(--accent); font-size: 12.5px; font-weight: 600;
    padding: 0; margin-bottom: 8px; text-align: left;
  }

  .st-stat-row { display: flex; gap: 8px; margin-bottom: 8px; }
  .st-stat-card { flex: 1; background: var(--surface); border: 1px solid var(--line); border-radius: 12px; padding: 10px 6px; text-align: center; }
  .st-stat-card .num { font-family: 'Teko', sans-serif; font-size: 26px; color: var(--text); line-height: 1; }
  .st-stat-card .lbl { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-top: 2px; }

  .st-chip-row { display: flex; gap: 8px; margin-bottom: 14px; }
  .st-chip { flex: 1; background: var(--surface); border: 1px solid var(--line); border-radius: 12px; padding: 9px 6px; text-align: center; }
  .st-chip .lbl { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.04em; }
  .st-chip .pct { font-family: 'Teko', sans-serif; font-size: 22px; color: var(--accent); margin: 1px 0; }
  .st-chip .cnt { font-size: 10px; color: var(--muted); }

  .st-start-btn {
    width: 100%; background: var(--accent); color: #1B1400; border: none; border-radius: 14px;
    padding: 14px 0; margin: 4px 0 18px; text-align: center;
  }
  .st-start-btn .main { display: block; font-family: 'Teko', sans-serif; font-size: 20px; font-weight: 700; }
  .st-start-btn .sub { display: block; font-size: 11.5px; opacity: 0.8; margin-top: 1px; }

  .st-scoreboard {
    background: linear-gradient(180deg, var(--surface2), var(--surface));
    border: 1px solid var(--line);
    border-radius: 16px;
    padding: 16px 14px;
    margin-bottom: 12px;
  }
  .st-block-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
  .st-block-nav button {
    background: var(--surface2); border: 1px solid var(--line); color: var(--text);
    width: 34px; height: 34px; border-radius: 9px; font-size: 16px; line-height: 1;
  }
  .st-block-nav button:disabled { opacity: 0.35; cursor: default; }
  .st-block-label { text-align: center; }
  .st-block-label .num { color: var(--accent); font-family: 'Teko', sans-serif; font-size: 15px; letter-spacing: 0.08em; }
  .st-block-label .name { font-size: 15px; font-weight: 600; }

  .st-clock {
    font-family: 'Teko', sans-serif; font-weight: 600; font-size: 64px; line-height: 1;
    text-align: center; letter-spacing: 0.03em; color: var(--accent);
    font-variant-numeric: tabular-nums; margin: 4px 0 10px;
  }
  .st-clock.st-done { color: var(--miss); animation: st-pulse 1s infinite; }
  @media (prefers-reduced-motion: reduce) { .st-clock.st-done { animation: none; } }
  @keyframes st-pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.45; } }

  .st-timer-controls { display: flex; gap: 8px; }
  .st-timer-controls button {
    flex: 1; padding: 10px 0; border-radius: 10px; border: 1px solid var(--line);
    background: var(--surface2); color: var(--text); font-weight: 600; font-size: 13px;
  }
  .st-timer-controls button.st-primary { background: var(--accent); color: #1B1400; border-color: var(--accent); }

  .st-card {
    background: var(--surface); border: 1px solid var(--line); border-radius: 14px;
    padding: 14px; margin-bottom: 12px;
  }
  .st-card h3 { font-size: 15px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 10px; }

  .st-spot-row { display: flex; align-items: center; justify-content: space-between; padding: 9px 0; border-bottom: 1px solid var(--line); gap: 8px; }
  .st-spot-row:last-child { border-bottom: none; }
  .st-spot-info { flex: 1; min-width: 0; }
  .st-spot-name { font-size: 13.5px; font-weight: 500; }
  .st-spot-stat { font-size: 12px; color: var(--muted); font-variant-numeric: tabular-nums; }
  .st-spot-stat b { color: var(--text); }
  .st-tap-btns { display: flex; gap: 6px; flex: 0 0 auto; }
  .st-tap-btns button {
    width: 46px; height: 40px; border-radius: 9px; border: none; font-weight: 700; font-size: 12px;
  }
  .st-btn-make { background: var(--make); color: #08210F; }
  .st-btn-miss { background: var(--surface2); color: var(--miss); border: 1px solid var(--miss); }

  .st-save-bar { margin: 4px 0 18px; }
  .st-save-bar button {
    width: 100%; padding: 13px 0; border-radius: 12px; border: none; background: var(--accent);
    color: #1B1400; font-weight: 700; font-size: 14px;
  }

  .st-section-title { font-size: 13px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); margin: 18px 0 8px; }

  .st-history-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--line); font-size: 12.5px; }
  .st-history-row:last-child { border-bottom: none; }
  .st-history-row .d { color: var(--muted); }
  .st-empty { color: var(--muted); font-size: 12.5px; text-align: center; padding: 10px 0; }

  .st-foot-links { display: flex; justify-content: center; gap: 18px; margin-top: 10px; }
  .st-link { background: none; border: none; color: var(--muted); font-size: 11.5px; text-decoration: underline; padding: 0; }

  .st-sheet-card { background: var(--surface); border: 1px solid var(--line); border-radius: 14px; padding: 12px 14px; margin-bottom: 12px; }
  .st-sheet-card h3 { font-size: 13px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }
  .st-sheet-status { font-size: 13px; font-weight: 600; }
  .st-sheet-status.st-on { color: var(--make); }
  .st-sheet-status.st-off { color: var(--muted); }
  .st-sheet-desc { font-size: 11.5px; color: var(--muted); margin-top: 2px; line-height: 1.4; }
  .st-sheet-actions { display: flex; gap: 14px; margin-top: 8px; }
  .st-sheet-note { font-size: 11px; color: var(--muted); margin-top: 6px; min-height: 14px; }

  .st-modal-backdrop {
    position: absolute; inset: 0; background: rgba(10, 12, 15, 0.72);
    display: flex; align-items: center; justify-content: center;
    z-index: 50; padding: 20px; border-radius: 18px;
  }
  .st-modal {
    background: var(--surface2); border: 1px solid var(--line); border-radius: 14px;
    padding: 18px; max-width: 340px; width: 100%;
  }
  .st-modal h3 { font-size: 17px; font-weight: 600; margin-bottom: 8px; color: var(--text); }
  .st-modal p { font-size: 13px; color: var(--text); line-height: 1.45; margin-bottom: 12px; }
  .st-modal-input {
    width: 100%; padding: 10px; border-radius: 8px; border: 1px solid var(--line);
    background: var(--bg); color: var(--text); font-size: 12.5px; margin-bottom: 12px;
    font-family: 'Inter', sans-serif;
  }
  .st-modal-actions { display: flex; gap: 8px; justify-content: flex-end; }
  .st-modal-actions button { padding: 9px 16px; border-radius: 9px; border: none; font-weight: 600; font-size: 13px; }
  .st-modal-cancel { background: var(--surface); color: var(--muted); border: 1px solid var(--line); }
  .st-modal-confirm { background: var(--accent); color: #1B1400; }
  .st-modal-confirm.st-danger { background: var(--miss); color: #2A0C0F; }

  #stToast { position: absolute; left: 14px; right: 14px; top: 10px; z-index: 60; pointer-events: none; }
  .st-toast {
    background: var(--surface2); border: 1px solid var(--line); color: var(--text);
    padding: 10px 14px; border-radius: 10px; font-size: 12.5px; text-align: center;
    box-shadow: 0 6px 18px rgba(0,0,0,0.45);
  }
</style>
</head>
<body>

<div class="st-app" id="stApp">
  <div id="stView"></div>
  <div id="stToast"></div>
  <div id="stModalRoot"></div>
</div>

<script>
(function () {
  const BLOCKS = [
    { id: 'warmup', name: 'Rhythm Warm-Up', minutes: 4, type: 'single', spot: 'Close range', target: 20, unit: 'attempts' },
    { id: 'midrange', name: 'Mid-Range, 5 Spots', minutes: 10, type: 'multi',
      spots: ['Left short corner', 'Left elbow', 'Free-throw line', 'Right elbow', 'Right short corner'], target: 10, unit: 'attempts' },
    { id: 'three', name: 'Three-Point, 5 Spots', minutes: 8, type: 'multi',
      spots: ['Left corner', 'Left wing', 'Top of key', 'Right wing', 'Right corner'], target: 8, unit: 'attempts' },
    { id: 'ft', name: 'Free Throws', minutes: 5, type: 'single', spot: 'Free-throw line', target: 20, unit: 'attempts' },
    { id: 'finisher', name: 'Finisher', minutes: 3, type: 'streak', target: 3 },
  ];
  const CATEGORY_LABELS = { midrange: 'Mid-Range', three: 'Three-Point', ft: 'Free Throw' };
  const THIRTY_DAYS_MS = 30 * 24 * 60 * 60 * 1000;
  const SHEETS_URL_KEY = 'settings:sheetsUrl';

  // Storage shim: use Claude's window.storage when this file is opened
  // inside Claude (artifact preview). Fall back to plain localStorage when
  // this file is hosted on its own (e.g. GitHub Pages), since window.storage
  // only exists inside Claude's own environment.
  const storage = (function () {
    const hasClaudeStorage = typeof window.storage === 'object' && window.storage
      && typeof window.storage.get === 'function';
    if (hasClaudeStorage) return window.storage;
    return {
      async get(key) {
        const v = localStorage.getItem(key);
        if (v === null) throw new Error('not found: ' + key);
        return { key, value: v };
      },
      async set(key, value) {
        localStorage.setItem(key, value);
        return { key, value };
      },
      async delete(key) {
        localStorage.removeItem(key);
        return { key, deleted: true };
      },
      async list(prefix) {
        const keys = [];
        for (let i = 0; i < localStorage.length; i++) {
          const k = localStorage.key(i);
          if (!prefix || (k && k.startsWith(prefix))) keys.push(k);
        }
        return { keys, prefix };
      },
    };
  })();

  let state = {
    view: 'home', // 'home' | 'session'
    blockIndex: 0,
    timeLeft: BLOCKS[0].minutes * 60,
    running: false,
    log: freshLog(),
    modal: null,
  };
  let timerHandle = null;

  function freshLog() {
    const log = {};
    BLOCKS.forEach(b => {
      if (b.type === 'multi') {
        log[b.id] = b.spots.map(() => ({ makes: 0, attempts: 0 }));
      } else if (b.type === 'streak') {
        log[b.id] = { makes: 0, attempts: 0, streak: 0, best: 0 };
      } else {
        log[b.id] = { makes: 0, attempts: 0 };
      }
    });
    return log;
  }

  function fmtClock(sec) {
    const m = Math.floor(Math.max(sec, 0) / 60);
    const s = Math.max(sec, 0) % 60;
    return m + ':' + String(s).padStart(2, '0');
  }

  function pct(m, a) { return a > 0 ? Math.round((m / a) * 100) : 0; }

  function hasProgress() {
    return Object.values(state.log).some(v => {
      if (Array.isArray(v)) return v.some(s => s.attempts > 0);
      return v.attempts > 0;
    });
  }

  // ---------- timer ----------
  function tick() {
    state.timeLeft -= 1;
    if (state.timeLeft <= 0) {
      state.timeLeft = 0;
      state.running = false;
      clearInterval(timerHandle);
    }
    renderMain();
  }

  function startPause() {
    if (state.running) {
      state.running = false;
      clearInterval(timerHandle);
    } else {
      if (state.timeLeft <= 0) return;
      state.running = true;
      timerHandle = setInterval(tick, 1000);
    }
    renderMain();
  }

  function resetTimer() {
    state.running = false;
    clearInterval(timerHandle);
    state.timeLeft = BLOCKS[state.blockIndex].minutes * 60;
    renderMain();
  }

  function goBlock(delta) {
    const next = state.blockIndex + delta;
    if (next < 0 || next >= BLOCKS.length) return;
    state.blockIndex = next;
    state.running = false;
    clearInterval(timerHandle);
    state.timeLeft = BLOCKS[next].minutes * 60;
    renderMain();
  }

  function logTap(blockId, spotIdx, made) {
    const block = BLOCKS.find(b => b.id === blockId);
    if (block.type === 'multi') {
      const rec = state.log[blockId][spotIdx];
      rec.attempts += 1;
      if (made) rec.makes += 1;
    } else if (block.type === 'streak') {
      const rec = state.log[blockId];
      rec.attempts += 1;
      if (made) { rec.makes += 1; rec.streak += 1; rec.best = Math.max(rec.best, rec.streak); }
      else { rec.streak = 0; }
    } else {
      const rec = state.log[blockId];
      rec.attempts += 1;
      if (made) rec.makes += 1;
    }
    renderMain();
  }

  // ---------- navigation between views ----------
  function goHome() {
    if (hasProgress()) { openModal('leaveSession'); return; }
    state.running = false;
    clearInterval(timerHandle);
    state.view = 'home';
    renderApp();
  }

  function startSession() {
    state.log = freshLog();
    state.blockIndex = 0;
    state.running = false;
    clearInterval(timerHandle);
    state.timeLeft = BLOCKS[0].minutes * 60;
    state.view = 'session';
    renderApp();
  }

  function renderApp() {
    if (state.view === 'home') renderHome();
    else renderSessionSkeleton();
  }

  // ---------- toast (replaces alert, since alert()/confirm()/prompt() are
  // blocked inside Claude's sandboxed artifact frame) ----------
  let toastTimer = null;
  function showToast(message) {
    const el = document.getElementById('stToast');
    if (!el) return;
    el.innerHTML = `<div class="st-toast">${message}</div>`;
    if (toastTimer) clearTimeout(toastTimer);
    toastTimer = setTimeout(() => { el.innerHTML = ''; }, 4200);
  }

  // ---------- modal (replaces confirm()/prompt()) ----------
  function openModal(kind, opts) {
    state.modal = Object.assign({ kind }, opts || {});
    renderModalRoot();
  }

  function closeModal() {
    state.modal = null;
    renderModalRoot();
  }

  function modalMarkup() {
    const m = state.modal;
    if (!m) return '';
    if (m.kind === 'connectSheet') {
      return `
        <div class="st-modal-backdrop">
          <div class="st-modal">
            <h3>Connect Google Sheet</h3>
            <p>Paste your Apps Script Web App URL (ends in /exec).</p>
            <input type="text" id="stModalInput" class="st-modal-input"
              placeholder="https://script.google.com/macros/s/.../exec"
              value="${(m.value || '').replace(/"/g, '&quot;')}" />
            <div class="st-modal-actions">
              <button class="st-modal-cancel" onclick="stCloseModal()">Cancel</button>
              <button class="st-modal-confirm" onclick="stConfirmModal()">Save</button>
            </div>
          </div>
        </div>`;
    }
    const copy = {
      disconnectSheet: {
        text: "Stop syncing to Google Sheets? Sessions you've already saved stay right here in the app, this just stops sending new ones.",
        confirmLabel: 'Disconnect', danger: false,
      },
      clearAll: {
        text: 'Clear every saved session? This cannot be undone.',
        confirmLabel: 'Clear', danger: true,
      },
      leaveSession: {
        text: "Leave this session without saving? The shots you've logged so far will be lost.",
        confirmLabel: 'Leave', danger: true,
      },
    }[m.kind] || { text: 'Are you sure?', confirmLabel: 'OK', danger: false };
    return `
      <div class="st-modal-backdrop">
        <div class="st-modal">
          <p>${copy.text}</p>
          <div class="st-modal-actions">
            <button class="st-modal-cancel" onclick="stCloseModal()">Cancel</button>
            <button class="st-modal-confirm ${copy.danger ? 'st-danger' : ''}" onclick="stConfirmModal()">${copy.confirmLabel}</button>
          </div>
        </div>
      </div>`;
  }

  function renderModalRoot() {
    const root = document.getElementById('stModalRoot');
    if (!root) return;
    root.innerHTML = modalMarkup();
    if (state.modal && state.modal.kind === 'connectSheet') {
      const input = document.getElementById('stModalInput');
      if (input) input.focus();
    }
  }

  async function confirmModal() {
    const m = state.modal;
    if (!m) return;
    const kind = m.kind;

    if (kind === 'connectSheet') {
      const inputEl = document.getElementById('stModalInput');
      const url = inputEl ? inputEl.value.trim() : '';
      closeModal();
      if (!url) return;
      if (!/^https:\/\//.test(url)) {
        showToast("That doesn't look like a URL, it should start with https://. Nothing was saved.");
        return;
      }
      try {
        await storage.set(SHEETS_URL_KEY, url, false);
      } catch (e) {
        showToast('Could not save that URL. Try again.');
        return;
      }
      renderHome();
      return;
    }

    if (kind === 'disconnectSheet') {
      closeModal();
      try { await storage.set(SHEETS_URL_KEY, '', false); } catch (e) { /* ignore */ }
      renderHome();
      return;
    }

    if (kind === 'clearAll') {
      closeModal();
      try {
        const listRes = await storage.list('sessions:', false);
        const keys = (listRes && listRes.keys) || [];
        for (const k of keys) { await storage.delete(k, false); }
      } catch (e) { /* ignore */ }
      const records = await loadHistory();
      renderStats(records);
      renderHistoryList(records);
      return;
    }

    if (kind === 'leaveSession') {
      closeModal();
      state.running = false;
      clearInterval(timerHandle);
      state.view = 'home';
      renderApp();
      return;
    }

    closeModal();
  }

  // ---------- session view ----------
  function blockCard(block) {
    const log = state.log[block.id];
    if (block.type === 'single') {
      return `
        <div class="st-card">
          <h3>${block.spot}</h3>
          <div class="st-spot-row">
            <div class="st-spot-info">
              <div class="st-spot-name">Target: ${block.target} ${block.unit}</div>
              <div class="st-spot-stat"><b>${log.makes}</b> makes / ${log.attempts} attempts</div>
            </div>
            <div class="st-tap-btns">
              <button class="st-btn-miss" onclick="stTap('${block.id}', null, false)">MISS</button>
              <button class="st-btn-make" onclick="stTap('${block.id}', null, true)">MAKE</button>
            </div>
          </div>
        </div>`;
    }
    if (block.type === 'multi') {
      const rows = block.spots.map((name, i) => {
        const rec = log[i];
        return `
          <div class="st-spot-row">
            <div class="st-spot-info">
              <div class="st-spot-name">${i + 1}. ${name}</div>
              <div class="st-spot-stat"><b>${rec.makes}</b>/${rec.attempts} &middot; target ${block.target}</div>
            </div>
            <div class="st-tap-btns">
              <button class="st-btn-miss" onclick="stTap('${block.id}', ${i}, false)">MISS</button>
              <button class="st-btn-make" onclick="stTap('${block.id}', ${i}, true)">MAKE</button>
            </div>
          </div>`;
      }).join('');
      return `<div class="st-card"><h3>5 Spots</h3>${rows}</div>`;
    }
    if (block.type === 'streak') {
      return `
        <div class="st-card">
          <h3>Free-Throw Line</h3>
          <div class="st-spot-row">
            <div class="st-spot-info">
              <div class="st-spot-name">Current streak: <b>${log.streak}</b> &middot; Best: ${log.best}</div>
              <div class="st-spot-stat">Target: ${block.target} in a row</div>
            </div>
            <div class="st-tap-btns">
              <button class="st-btn-miss" onclick="stTap('${block.id}', null, false)">MISS</button>
              <button class="st-btn-make" onclick="stTap('${block.id}', null, true)">MAKE</button>
            </div>
          </div>
        </div>`;
    }
    return '';
  }

  function renderSessionSkeleton() {
    const app = document.getElementById('stView');
    app.innerHTML = `
      <div class="st-header">
        <button class="st-back-link" onclick="stGoHome()">&larr; Back to summary</button>
        <div class="eyebrow">Shooting Session</div>
        <h1>30-Minute Plan</h1>
      </div>
      <div id="stMainWrap"></div>
      <div class="st-save-bar"><button onclick="stSaveSession()">Save Session</button></div>
    `;
    renderMain();
  }

  function renderMain() {
    const wrap = document.getElementById('stMainWrap');
    if (!wrap) return;
    const block = BLOCKS[state.blockIndex];
    const done = state.timeLeft <= 0;
    wrap.innerHTML = `
      <div class="st-scoreboard">
        <div class="st-block-nav">
          <button onclick="stGoBlock(-1)" ${state.blockIndex === 0 ? 'disabled' : ''}>&larr;</button>
          <div class="st-block-label">
            <div class="num">BLOCK ${state.blockIndex + 1} OF ${BLOCKS.length}</div>
            <div class="name">${block.name}</div>
          </div>
          <button onclick="stGoBlock(1)" ${state.blockIndex === BLOCKS.length - 1 ? 'disabled' : ''}>&rarr;</button>
        </div>
        <div class="st-clock ${done ? 'st-done' : ''}">${fmtClock(state.timeLeft)}</div>
        <div class="st-timer-controls">
          <button class="st-primary" onclick="stStartPause()">${state.running ? 'Pause' : (done ? "Time&#39;s up" : 'Start')}</button>
          <button onclick="stResetTimer()">Reset</button>
        </div>
      </div>
      ${blockCard(block)}
    `;
  }

  // ---------- storage ----------
  async function loadHistory() {
    try {
      const listRes = await storage.list('sessions:', false);
      const keys = (listRes && listRes.keys) || [];
      const records = [];
      for (const k of keys) {
        try {
          const r = await storage.get(k, false);
          if (r && r.value) records.push(JSON.parse(r.value));
        } catch (e) { /* skip unreadable entry */ }
      }
      records.sort((a, b) => new Date(b.date) - new Date(a.date));
      return records;
    } catch (e) {
      return [];
    }
  }

  function aggregate(records, withinMs) {
    const cutoff = withinMs ? Date.now() - withinMs : null;
    const recs = cutoff ? records.filter(r => new Date(r.date).getTime() >= cutoff) : records;
    const cat = {};
    Object.keys(CATEGORY_LABELS).forEach(k => { cat[k] = { makes: 0, attempts: 0 }; });
    let totalMakes = 0, totalAttempts = 0;
    recs.forEach(r => {
      Object.entries((r.totals && r.totals.blocks) || {}).forEach(([id, b]) => {
        totalMakes += b.makes; totalAttempts += b.attempts;
        if (cat[id]) { cat[id].makes += b.makes; cat[id].attempts += b.attempts; }
      });
    });
    return { sessions: recs.length, totalMakes, totalAttempts, cat };
  }

  // Baked-in default so the app is connected out of the box, no manual
  // entry needed. An explicit disconnect stores '' to override this
  // (see confirmModal's disconnectSheet branch) so disconnecting sticks.
  const DEFAULT_SHEETS_URL = 'https://script.google.com/macros/s/AKfycbyzfyF7bBPsmlUqI_MuafmUQJr5sMYvVXEMMgzPGEZBj0aC6ch9I1DwalkGHpIJdPjyNg/exec';

  async function getSheetsUrl() {
    try {
      const r = await storage.get(SHEETS_URL_KEY, false);
      if (r && typeof r.value === 'string') {
        return r.value === '' ? null : r.value;
      }
    } catch (e) { /* never set on this device, fall through to default */ }
    return DEFAULT_SHEETS_URL || null;
  }

  async function pushToSheet(record, url) {
    try {
      await fetch(url, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify(record),
      });
      return true;
    } catch (e) {
      return false;
    }
  }

  async function connectSheet() {
    const existing = await getSheetsUrl();
    openModal('connectSheet', { value: existing || '' });
  }

  function disconnectSheet() {
    openModal('disconnectSheet');
  }

  async function resyncAll() {
    const url = await getSheetsUrl();
    if (!url) { showToast('Connect a Google Sheet first.'); return; }
    const statusEl = document.getElementById('stSheetNote');
    const records = await loadHistory();
    if (!records.length) {
      if (statusEl) statusEl.textContent = 'No sessions saved yet.';
      return;
    }
    for (let i = 0; i < records.length; i++) {
      if (statusEl) statusEl.textContent = `Resyncing ${i + 1} of ${records.length}...`;
      await pushToSheet(records[i], url);
    }
    if (statusEl) statusEl.textContent = `Sent ${records.length} session${records.length === 1 ? '' : 's'} to the sheet.`;
  }

  async function saveSession() {
    const totals = { blocks: {} };
    BLOCKS.forEach(b => {
      if (b.type === 'multi') {
        totals.blocks[b.id] = state.log[b.id].reduce(
          (a, s) => ({ makes: a.makes + s.makes, attempts: a.attempts + s.attempts }),
          { makes: 0, attempts: 0 }
        );
      } else {
        totals.blocks[b.id] = { makes: state.log[b.id].makes, attempts: state.log[b.id].attempts };
      }
    });
    const record = { date: new Date().toISOString(), totals };
    const key = 'sessions:' + Date.now();

    let res;
    try {
      res = await storage.set(key, JSON.stringify(record), false);
    } catch (e) {
      showToast('Could not save this session. Nothing was recorded.');
      return;
    }
    if (!res) {
      showToast('Could not save this session. Nothing was recorded.');
      return;
    }

    const sheetsUrl = await getSheetsUrl();
    if (sheetsUrl) { pushToSheet(record, sheetsUrl); }

    state.log = freshLog();
    state.blockIndex = 0;
    state.running = false;
    clearInterval(timerHandle);
    state.timeLeft = BLOCKS[0].minutes * 60;
    state.view = 'home';
    renderApp();
  }

  function clearAll() {
    openModal('clearAll');
  }

  async function exportData() {
    try {
      const records = await loadHistory();
      const blob = new Blob([JSON.stringify(records, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'shooting-sessions-' + new Date().toISOString().slice(0, 10) + '.json';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    } catch (e) {
      showToast('Could not export right now. Try again in a moment.');
    }
  }

  // ---------- home view ----------
  function sheetCard(url) {
    if (url) {
      return `
        <div class="st-sheet-card">
          <h3>Google Sheet</h3>
          <div class="st-sheet-status st-on">Connected</div>
          <div class="st-sheet-desc">New sessions are sent to your sheet automatically.</div>
          <div class="st-sheet-actions">
            <button class="st-link" onclick="stResyncAll()">Resync all sessions</button>
            <button class="st-link" onclick="stDisconnectSheet()">Disconnect</button>
          </div>
          <div class="st-sheet-note" id="stSheetNote"></div>
        </div>`;
    }
    return `
      <div class="st-sheet-card">
        <h3>Google Sheet</h3>
        <div class="st-sheet-status st-off">Not connected</div>
        <div class="st-sheet-desc">Set this up once to send every session to a Google Sheet automatically.</div>
        <div class="st-sheet-actions">
          <button class="st-link" onclick="stConnectSheet()">Connect Google Sheet</button>
        </div>
        <div class="st-sheet-note" id="stSheetNote"></div>
      </div>`;
  }

  function renderHome() {
    const app = document.getElementById('stView');
    app.innerHTML = `
      <div class="st-header">
        <div class="eyebrow">Shooting Tracker</div>
        <h1>Last 30 Days</h1>
      </div>
      <div id="stStatsWrap"><div class="st-empty">Loading&hellip;</div></div>
      <div id="stSheetWrap"><div class="st-empty">Loading&hellip;</div></div>
      <button class="st-start-btn" onclick="stStartSession()">
        <span class="main">Start Session</span>
        <span class="sub">&rarr; Block 1 of 5, Rhythm Warm-Up</span>
      </button>
      <div class="st-section-title">Recent Sessions</div>
      <div id="stHistory"><div class="st-empty">Loading&hellip;</div></div>
      <div class="st-foot-links">
        <button class="st-link" onclick="stExportData()">Export data (.json)</button>
        <button class="st-link" onclick="stClearAll()">Clear all saved sessions</button>
      </div>
    `;
    loadHistory().then(records => {
      renderStats(records);
      renderHistoryList(records);
    });
    getSheetsUrl().then(url => {
      const wrap = document.getElementById('stSheetWrap');
      if (wrap) wrap.innerHTML = sheetCard(url);
    });
  }

  function renderStats(records) {
    const el = document.getElementById('stStatsWrap');
    if (!el) return;
    const agg = aggregate(records, THIRTY_DAYS_MS);
    const overallPct = pct(agg.totalMakes, agg.totalAttempts);
    const chips = Object.keys(CATEGORY_LABELS).map(k => {
      const c = agg.cat[k];
      return `
        <div class="st-chip">
          <div class="lbl">${CATEGORY_LABELS[k]}</div>
          <div class="pct">${pct(c.makes, c.attempts)}%</div>
          <div class="cnt">${c.makes}/${c.attempts}</div>
        </div>`;
    }).join('');
    el.innerHTML = `
      <div class="st-stat-row">
        <div class="st-stat-card"><div class="num">${agg.sessions}</div><div class="lbl">Sessions</div></div>
        <div class="st-stat-card"><div class="num">${agg.totalAttempts}</div><div class="lbl">Total Shots</div></div>
        <div class="st-stat-card"><div class="num">${overallPct}%</div><div class="lbl">Overall FG</div></div>
      </div>
      <div class="st-chip-row">${chips}</div>
    `;
  }

  function renderHistoryList(records) {
    const el = document.getElementById('stHistory');
    if (!el) return;
    if (!records.length) {
      el.innerHTML = '<div class="st-empty">No sessions saved yet, log one above.</div>';
      return;
    }
    el.innerHTML = records.slice(0, 8).map(r => {
      const d = new Date(r.date);
      const dateStr = d.toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
      let makes = 0, attempts = 0;
      Object.values((r.totals && r.totals.blocks) || {}).forEach(b => { makes += b.makes; attempts += b.attempts; });
      return `<div class="st-history-row"><span class="d">${dateStr}</span><span>${makes}/${attempts} makes</span></div>`;
    }).join('');
  }

  window.stTap = logTap;
  window.stStartPause = startPause;
  window.stResetTimer = resetTimer;
  window.stGoBlock = goBlock;
  window.stGoHome = goHome;
  window.stStartSession = startSession;
  window.stSaveSession = saveSession;
  window.stClearAll = clearAll;
  window.stExportData = exportData;
  window.stConnectSheet = connectSheet;
  window.stDisconnectSheet = disconnectSheet;
  window.stResyncAll = resyncAll;
  window.stCloseModal = closeModal;
  window.stConfirmModal = confirmModal;

  renderApp();
})();
</script>
</body>
</html>
